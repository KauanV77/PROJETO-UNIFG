<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Os sem futuro| Conversor de Unidades</title>

  <style>
    :root {
      --primary: #7c3aed;
      --secondary: #06b6d4;
      --bg-dark: #020617;
      --card: rgba(15, 23, 42, 0.72);
      --card-light: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.13);
      --success: #22c55e;
      --danger: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 15%, rgba(124, 58, 237, 0.45), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(6, 182, 212, 0.35), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(34, 197, 94, 0.15), transparent 30%),
        var(--bg-dark);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent);
      pointer-events: none;
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 34px 20px;
      position: relative;
      z-index: 1;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 46px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: -0.5px;
      font-size: 22px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 18px 35px rgba(124, 58, 237, 0.35);
    }

    .nav-tag {
      color: var(--muted);
      font-size: 14px;
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 34px;
      align-items: center;
    }

    .headline {
      padding: 26px 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: #dbeafe;
      margin-bottom: 22px;
      font-size: 14px;
    }

    .headline h1 {
      font-size: clamp(42px, 7vw, 78px);
      line-height: 0.94;
      letter-spacing: -3px;
      margin-bottom: 22px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #ffffff, #a5f3fc, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .headline p {
      max-width: 590px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .stat {
      min-width: 135px;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .app-card {
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)),
        var(--card);
      backdrop-filter: blur(26px);
      border-radius: 34px;
      padding: 22px;
      box-shadow: 0 35px 90px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
    }

    .app-card::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      top: -70px;
      right: -70px;
      background: radial-gradient(circle, rgba(124,58,237,0.45), transparent 65%);
      pointer-events: none;
    }

    .card-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
